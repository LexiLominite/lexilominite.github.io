<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batman Theme</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: black;
            color: white;
            overflow: hidden;
        }

        header {
            text-align: center;
            padding: 20px;
            background: red;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            text-transform: uppercase;
        }

        #message {
            margin: 20px;
            font-size: 1.2rem;
            text-align: center;
            background: rgba(255, 0, 0, 0.1);
            padding: 20px;
            border-radius: 10px;
            animation: fadeInOut 4s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .batman {
            position: absolute;
            width: 100px;
            height: 60px;
            background: url('https://upload.wikimedia.org/wikipedia/en/3/3e/Batman_logo.png') no-repeat;
            background-size: contain;
            animation: fly 10s linear infinite;
        }

        @keyframes fly {
            0% { transform: translate(-150px, 0px); }
            25% { transform: translate(50vw, -100px); }
            50% { transform: translate(100vw, 50px); }
            75% { transform: translate(50vw, -200px); }
            100% { transform: translate(-150px, 0px); }
        }

        footer {
            text-align: center;
            padding: 10px;
            background: red;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        footer p {
            margin: 0;
            font-size: 1rem;
        }

        .bat-signal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Bat_signal.svg/512px-Bat_signal.svg.png') no-repeat;
            background-size: contain;
            width: 150px;
            height: 150px;
            opacity: 0;
            animation: signalAppear 3s ease-in-out infinite;
        }

        @keyframes signalAppear {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Gotham</h1>
    </header>

    <div id="message">
        If you are still seeing this in March 2025, please remember Batman to use some nights not just to save the city but also to work on this website. After all, even the Batmobile gets a tune-up now and then!
    </div>

    <div class="batman" style="top: 100px; left: 0;"></div>
    <div class="batman" style="top: 300px; left: 0;"></div>
    <div class="bat-signal"></div>

    <footer>
        <p>&copy; 2025 Gotham Studios. Dark Knights welcome!</p>
    </footer>
</body>
</html>
